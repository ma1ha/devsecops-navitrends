services:
  db:
    image: postgres:15.10
    container_name: odoo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${ODOO_POSTGRES_DB}
      POSTGRES_USER:     ${ODOO_POSTGRES_USER}
      POSTGRES_PASSWORD: ${ODOO_POSTGRES_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - odoo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ODOO_POSTGRES_USER} -d ${ODOO_POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  odoo:
    image: odoo:18.0
    container_name: odoo-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${ODOO_BIND_IP}:${ODOO_PORT}:8069"
    environment:
      HOST:     db
      USER:     ${ODOO_POSTGRES_USER}
      PASSWORD: ${ODOO_POSTGRES_PASSWORD}
    volumes:
      - odoo-data:/var/lib/odoo
    networks:
      - odoo-network
      - integration-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8069/web/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  db-data:
  odoo-data:

networks:
  odoo-network:
    driver: bridge
  integration-network:
    external: true