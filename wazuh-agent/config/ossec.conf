<ossec_config>
 
  <!-- ==================== MANAGER CONNECTION ==================== -->
  <client>
    <server>
      <address>WAZUH_MANAGER_PLACEHOLDER</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <notify_time>60</notify_time>
    <time-reconnect>300</time-reconnect>
    <auto_restart>yes</auto_restart>
    <crypto_method>aes</crypto_method>
  </client>
 
  <!-- ==================== AGENT BUFFER ==================== -->
  <client_buffer>
    <disabled>no</disabled>
    <queue_size>5000</queue_size>
    <events_per_second>500</events_per_second>
  </client_buffer>
 
  <!-- ==================== FILE INTEGRITY MONITORING ==================== -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>
    <auto_ignore frequency="10" timeframe="3600">no</auto_ignore>
 
    <!-- Odoo -->
    <directories check_all="yes" realtime="yes" report_changes="yes">/volumes/odoo/data</directories>
 
    <!-- n8n -->
    <directories check_all="yes" realtime="yes" report_changes="yes">/volumes/n8n/data</directories>
 
    <!-- Nextcloud -->
    <directories check_all="yes" realtime="yes" report_changes="yes">/volumes/nextcloud/data</directories>
 
    <!-- Mautic -->
    <directories check_all="yes" realtime="yes" report_changes="yes">/volumes/mautic/data</directories>
    <directories check_all="yes" realtime="yes" report_changes="yes">/volumes/mautic/logs</directories>
 
    <!-- Frappe/ERPNext -->
    <directories check_all="yes" realtime="yes" report_changes="yes">/volumes/frappe/sites</directories>
 
    <!-- Jenkins — high priority, pipeline configs and credentials live here -->
    <directories check_all="yes" realtime="yes" report_changes="yes">/volumes/jenkins/home</directories>
 
    <!-- Vault — critical, any change here is a security event -->
    <directories check_all="yes" realtime="yes" report_changes="yes">/volumes/vault/data</directories>
 
    <!-- Ignore noisy runtime files that change constantly -->
    <ignore type="sregex">.log$|.tmp$|.cache$|.pid$|.sock$</ignore>
    <ignore>/volumes/nextcloud/data/appdata_ocm</ignore>
    <ignore>/volumes/odoo/data/filestore</ignore>
 
    <!-- Never diff vault data contents (contains encrypted secrets) -->
    <nodiff>/volumes/vault/data</nodiff>
  </syscheck>
 
  <!-- ==================== LOG ANALYSIS ==================== -->
 
  <!-- Odoo -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/containers/odoo/*.log</location>
  </localfile>
 
  <!-- n8n -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/log/containers/n8n/*.log</location>
  </localfile>
 
  <!-- Nextcloud -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/containers/nextcloud/*.log</location>
  </localfile>
 
  <!-- Mautic -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/containers/mautic/*.log</location>
  </localfile>
 
  <!-- Frappe/ERPNext -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/containers/frappe/*.log</location>
  </localfile>
 
  <!-- Jenkins -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/containers/jenkins/*.log</location>
  </localfile>
 
  <!-- Vault audit log -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/log/containers/vault/*.log</location>
  </localfile>
 
  <!-- ==================== DOCKER EVENT MONITORING ==================== -->
  <localfile>
    <log_format>json</log_format>
    <command>docker events --format '{"time":"{{.Time}}","action":"{{.Action}}","type":"{{.Type}}","actor":"{{.Actor.ID}}","name":"{{index .Actor.Attributes \"name\"}}"}' --filter type=container --filter type=image --filter type=network</command>
    <frequency>60</frequency>
    <alias>docker-events</alias>
  </localfile>
 
  <!-- ==================== ROOTCHECK ==================== -->
  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <frequency>43200</frequency>
  </rootcheck>
 
  <!-- ==================== VULNERABILITY DETECTION ==================== -->
  <vulnerability-detection>
    <enabled>yes</enabled>
    <interval>12h</interval>
    <run_on_start>yes</run_on_start>
  </vulnerability-detection>
 
  <!-- ==================== SECURITY CONFIGURATION ASSESSMENT ==================== -->
  <sca>
    <enabled>yes</enabled>
    <scan_on_start>yes</scan_on_start>
    <interval>12h</interval>
    <skip_nfs>yes</skip_nfs>
  </sca>
 
  <!-- ==================== ACTIVE RESPONSE ==================== -->
  <active-response>
    <disabled>no</disabled>
    <ca_store>/var/ossec/etc/wpk_root.pem</ca_store>
    <ca_verification>yes</ca_verification>
  </active-response>
 
  <!-- ==================== LOGGING ==================== -->
  <logging>
    <log_format>plain</log_format>
  </logging>
 
</ossec_config>