services:
  nextcloud-db:
    image: postgres:15.10
    container_name: nextcloud-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${NC_POSTGRES_PASSWORD}
      POSTGRES_DB:       ${NC_POSTGRES_DB}
      POSTGRES_USER:     ${NC_POSTGRES_USER}
    volumes:
      - nextcloud-db-data:/var/lib/postgresql/data
    networks:
      - nextcloud-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NC_POSTGRES_USER} -d ${NC_POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nextcloud:
    image: nextcloud:33-apache
    container_name: nextcloud-app
    restart: unless-stopped
    depends_on:
      nextcloud-db:
        condition: service_healthy
    ports:
      - "${NEXTCLOUD_BIND_IP}:${NEXTCLOUD_PORT}:80"
    environment:
      POSTGRES_HOST:     nextcloud-db
      POSTGRES_DB:       ${NC_POSTGRES_DB}
      POSTGRES_USER:     ${NC_POSTGRES_USER}
      POSTGRES_PASSWORD: ${NC_POSTGRES_PASSWORD}
    volumes:
      - nextcloud-data:/var/www/html
    networks:
      - nextcloud-network
      - integration-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/status.php"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  nextcloud-db-data:
  nextcloud-data:

networks:
  nextcloud-network:
    driver: bridge
  integration-network:
    external: true